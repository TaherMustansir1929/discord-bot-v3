name: Deploy to VPS

on:
    push:
        branches:
            - main # Change this to your target branch (e.g., master, production)

jobs:
    deploy:
        name: SSH & Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }} # Optional: defaults to 22 if not set
                  script: |
                      cd ~/discord-bot-v3/
                      bash deploy.sh
